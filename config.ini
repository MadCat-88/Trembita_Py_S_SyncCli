[trembita]
protocol = https
host = your_SS_IP_address
purpose_id = ""
cert_path = certs
asic_path = asic
cert_file = cert.pem
key_file = key.pem
trembita_cert_file = gate.pem
user_id = python_service_user

[client]
instance = your_instance_name
memberClass = GOV
memberCode = your_member_code
subsystemCode = client_subystem_code

[service]
instance = your_instance_name
memberClass = GOV
memberCode = your_member_code
subsystemCode = service_subystem_code

[logging]
filename = /tmp/soap_sync_client.log
filemode = a
format = %(asctime)s,%(msecs)d %(name)s %(levelname)s %(message)s
dateformat = %H:%M:%S
level = DEBUG # info warning debug

